<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bộ sưu tập của Bông</title>
  <meta name="description" content="Xem sao, sticker và huy hiệu bé đã nhận trên thiết bị này.">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#FFB7C5">
  <link rel="icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <script src="./shared-ui.js" defer></script>
  <script src="./js/reward-collection.js" defer></script>
  <style>
    body { margin: 0; min-height: 100vh; background: var(--bh-color-background, #fff7f0); color: var(--bh-color-text, #6b4e71); font-family: "Segoe UI", Arial, sans-serif; }
    .bh-collection { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 56px; }
    .bh-collection__top { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .bh-collection__back { min-height: 44px; display: inline-flex; align-items: center; padding: 0 16px; border-radius: 999px; background: #fff; color: inherit; text-decoration: none; font-weight: 800; box-shadow: 0 4px 14px rgba(107,78,113,.12); }
    .bh-collection h1 { margin: 24px 0 6px; font-size: clamp(30px, 7vw, 48px); }
    .bh-collection__intro { margin: 0 0 22px; font-weight: 650; color: #806d86; }
    .bh-collection__stars { padding: 20px; border-radius: 24px; background: #fff8df; border: 3px solid #ffe0a3; font-size: clamp(22px, 5vw, 30px); font-weight: 900; text-align: center; }
    .bh-collection section { margin-top: 28px; }
    .bh-collection h2 { margin-bottom: 12px; }
    .bh-reward-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
    .bh-reward-card { min-height: 150px; padding: 16px 12px; border-radius: 22px; background: #fff; border: 3px solid #eadff0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; box-shadow: 0 5px 15px rgba(107,78,113,.08); }
    .bh-reward-card[aria-disabled="true"] { opacity: .5; filter: grayscale(.75); }
    .bh-reward-card__icon { font-size: 46px; line-height: 1; }
    .bh-reward-card strong { margin-top: 10px; }
    .bh-reward-card small { margin-top: 6px; color: #806d86; }
    .bh-collection__empty { padding: 18px; border-radius: 18px; background: #fff; text-align: center; }
    @media (max-width: 520px) { .bh-reward-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>
  <main class="bh-collection">
    <div class="bh-collection__top">
      <a class="bh-collection__back" href="./index.html">← Về trang chủ</a>
    </div>
    <h1>Bộ sưu tập của Bông</h1>
    <p class="bh-collection__intro">Mỗi phần thưởng là một lời khen nhẹ nhàng cho những lần bé hoàn thành trò chơi.</p>
    <div class="bh-collection__stars" id="collectionStars" aria-live="polite">⭐ Đang xem số sao…</div>
    <section aria-labelledby="stickerTitle">
      <h2 id="stickerTitle">Sticker</h2>
      <div class="bh-reward-grid" id="collectionStickers"></div>
    </section>
    <section aria-labelledby="badgeTitle">
      <h2 id="badgeTitle">Huy hiệu</h2>
      <div class="bh-reward-grid" id="collectionBadges"></div>
    </section>
  </main>
</body>
</html>
