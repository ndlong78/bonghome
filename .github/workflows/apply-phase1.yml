name: Apply phase 1 improvements

on:
  push:
    branches: [agent/phase1-improvements]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[phase1-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase1-improvements
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node tools/apply-phase1.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html game*.html manifest.json README.md sw.js shared-ui.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Apply phase 1 improvements [phase1-applied]"
          git push
