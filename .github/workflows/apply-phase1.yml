name: Apply phase 1 improvements

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.pull_request.head.sha, '[phase1-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node tools/apply-phase1.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html game*.html manifest.json README.md sw.js shared-ui.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Apply phase 1 improvements [phase1-applied]"
          git push
