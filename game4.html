<style>
  :root{ --kem:#FFF7F0; --hong:#FFB7C5; --tim:#C9B6F5; --vang:#FFE0A3; --mint:#A8E6CF; --troi:#BFE3FF; --chu:#6B4E71; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    margin:0; min-height:100vh; padding:14px 12px 40px;
    font-family:"Segoe UI","Nunito",Arial,sans-serif; color:var(--chu);
    background:var(--kem);
    background-image:radial-gradient(circle at 12% 6%,rgba(255,203,164,.35),transparent 30%),
                     radial-gradient(circle at 88% 8%,rgba(191,227,255,.35),transparent 32%),
                     linear-gradient(180deg,#FFF1E4 0%,var(--kem) 40%);
    background-attachment:fixed; overflow-x:hidden;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  .khung{ max-width:860px; margin:0 auto; }
  .thanh-tren{ display:flex; align-items:center; gap:10px; }
  .nut-ve{ display:inline-flex; gap:6px; padding:10px 16px; background:#fff; color:var(--chu); text-decoration:none;
    font-size:16px; font-weight:800; border:3px solid var(--tim); border-radius:999px; box-shadow:0 4px 0 rgba(0,0,0,.06); }
  .nut-ve:active{ transform:translateY(2px); box-shadow:none; }
  h1{ flex:1; text-align:center; font-size:clamp(21px,5vw,34px); margin:0; color:#7A4E86; text-shadow:0 2px 0 #fff; }
  .cham{ width:52px; }
  @media (max-width:560px){ .cham{display:none;} h1{font-size:19px;} }
  .huong-dan{ text-align:center; font-size:clamp(15px,3.4vw,19px); font-weight:700; color:#8D7595; margin:10px 0 12px; }

  .bang-so{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .o-so{ background:#fff; border:3px solid var(--mint); border-radius:18px; padding:8px 16px; min-width:104px; text-align:center; box-shadow:0 4px 0 rgba(0,0,0,.05); }
  .o-so .nhan{ font-size:12px; font-weight:700; color:#8D7595; display:block; }
  .o-so .gia-tri{ font-size:22px; font-weight:900; color:#4E9A78; }

  /* Sân đồ vật */
  .san-do{
    background:#fff; border:5px dashed var(--vang); border-radius:26px;
    padding:16px 12px; margin-bottom:20px;
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center;
    min-height:150px;
  }
  .do-vat{ width:74px; height:74px; cursor:grab; touch-action:none; transition:transform .15s ease; }
  .do-vat svg{ width:100%; height:100%; pointer-events:none; }
  .do-vat:active{ transform:scale(1.08); }
  .do-vat.dang-keo{ position:fixed; z-index:90; transform:scale(1.2) rotate(-5deg); filter:drop-shadow(0 10px 14px rgba(120,80,140,.35)); }
  .do-vat.xong{ display:none; }
  .san-do .loi-het{ font-size:19px; font-weight:800; color:#B7A4C2; }

  /* Hàng 4 cái giỏ */
  .hang-gio{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  @media (max-width:520px){ .hang-gio{ grid-template-columns:repeat(2,1fr); } }
  .gio{
    background:#fff; border:5px solid var(--mau,#ccc); border-radius:22px;
    padding:8px 6px 10px; text-align:center;
    box-shadow:0 6px 0 rgba(0,0,0,.06);
    transition:transform .15s ease, background .15s ease;
  }
  .gio svg{ width:70%; max-width:96px; height:auto; }
  .gio .ten-gio{ font-size:15px; font-weight:800; color:#7A6180; display:block; margin-top:2px; }
  .gio .dem{ font-size:13px; font-weight:800; color:#fff; background:var(--mau,#ccc); border-radius:999px; padding:2px 12px; display:inline-block; margin-top:4px; }
  .gio.gan-toi{ transform:scale(1.07) translateY(-4px); background:#FFFBEF; }
  .gio.dung{ animation:reo-vui .45s ease; }
  @keyframes reo-vui{ 0%,100%{transform:scale(1);} 45%{transform:scale(1.1);} }
  .gio.sai{ animation:lac-nhe .4s ease; }
  @keyframes lac-nhe{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-7px);} 75%{transform:translateX(7px);} }

  .nhom-nut-duoi{ display:flex; justify-content:center; margin-top:22px; }
  .nhom-nut-duoi button{ font-family:inherit; font-size:17px; font-weight:800; padding:13px 26px; border:none; border-radius:999px; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,.12); background:var(--troi); color:#3E6E96; }
  .nhom-nut-duoi button:active{ transform:translateY(3px); box-shadow:none; }

  #phaoGiay{ position:fixed; inset:0; pointer-events:none; z-index:60; display:none; }
  .man-thang{ position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center; background:rgba(122,78,134,.35); padding:16px; }
  .man-thang.hien{ display:flex; }
  .hop-thang{ background:#fff; border:6px solid var(--vang); border-radius:34px; padding:26px 24px; text-align:center; max-width:400px; width:100%; box-shadow:0 20px 50px rgba(120,80,140,.35); animation:bat-len .5s cubic-bezier(.2,1.4,.4,1); }
  @keyframes bat-len{ from{transform:scale(.6);opacity:0;} to{transform:scale(1);opacity:1;} }
  .hop-thang h2{ font-size:30px; margin:6px 0 4px; color:#E0729B; }
  .hop-thang .loi{ font-size:17px; font-weight:700; color:#8D7595; margin:0 0 14px; }
  .ket-qua{ display:flex; gap:10px; }
  .ket-qua div{ flex:1; background:#FFF8E7; border:3px solid var(--vang); border-radius:16px; padding:10px 6px; }
  .ket-qua .nhan{ font-size:12px; font-weight:700; color:#9A7B4F; display:block; }
  .ket-qua .gia-tri{ font-size:24px; font-weight:900; color:#9A6410; }
  .ky-luc-moi{ font-size:17px; font-weight:900; color:#4E9A78; background:#EAFBF3; border:3px dashed var(--mint); border-radius:14px; padding:8px; margin:12px 0 0; display:none; }
  .ky-luc-moi.hien{ display:block; }
  .nhom-nut{ display:flex; gap:10px; margin-top:16px; }
  .nhom-nut button,.nhom-nut a{ flex:1; font-family:inherit; font-size:17px; font-weight:800; padding:14px 10px; border:none; border-radius:999px; cursor:pointer; text-decoration:none; box-shadow:0 5px 0 rgba(0,0,0,.12); }
  .nut-choi-lai{ background:var(--hong); color:#fff; }
  .nhom-nut a{ background:var(--troi); color:#3E6E96; display:flex; align-items:center; justify-content:center; }
  .nhom-nut button:active,.nhom-nut a:active{ transform:translateY(3px); box-shadow:none; }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; } }
</style>

<body>

<div class="khung">
  <div class="thanh-tren">
    <a class="nut-ve" href="index.html">🏠 Về nhà</a>
    <h1>Gom Đồ Theo Màu</h1>
    <div class="cham"></div>
  </div>

  <p class="huong-dan">Bé kéo mỗi đồ vật vào cái giỏ <b>cùng màu</b> với nó nhé!</p>

  <div class="bang-so">
    <div class="o-so"><span class="nhan">Đã gom</span><span class="gia-tri" id="soGom">0/12</span></div>
    <div class="o-so"><span class="nhan">Thời gian</span><span class="gia-tri" id="dongHo">0:00</span></div>
    <div class="o-so"><span class="nhan">Kỷ lục</span><span class="gia-tri" id="kyLuc">--</span></div>
  </div>

  <div class="san-do" id="sanDo"></div>
  <div class="hang-gio" id="hangGio"></div>

  <div class="nhom-nut-duoi"><button id="nutVanMoi">🔄 Ván mới</button></div>
</div>

<canvas id="phaoGiay" aria-hidden="true"></canvas>

<div class="man-thang" id="manThang" role="dialog" aria-modal="true" aria-labelledby="tieuDeThang" aria-describedby="loiKhen">
  <div class="hop-thang">
    <div style="font-size:52px">🧺🎉</div>
    <h2>Bé gom giỏi quá!</h2>
    <p class="loi" id="loiKhen">Mọi đồ vật đã về đúng giỏ của mình!</p>
    <div class="ket-qua">
      <div><span class="nhan">Thời gian</span><span class="gia-tri" id="tgCuoi">0:00</span></div>
      <div><span class="nhan">Bỏ nhầm</span><span class="gia-tri" id="saiCuoi">0</span></div>
    </div>
    <div class="ky-luc-moi" id="bangKyLuc">🏆 Kỷ lục mới của bé!</div>
    <div class="nhom-nut">
      <button class="nut-choi-lai" id="nutChoiLai">Chơi lại</button>
      <a href="index.html">Về nhà</a>
    </div>
  </div>
</div>

<script>
/* ===== ÂM THANH WEB AUDIO API ===== */
let boLoa=null;
function batLoa(){
  if(window.BongSound && !window.BongSound.isEnabled()) return null; if(!boLoa){ const A=window.AudioContext||window.webkitAudioContext; if(A) boLoa=new A(); }
  if(boLoa&&boLoa.state==="suspended") boLoa.resume(); return boLoa; }
function keoChuong(f,d=.3,t=0,v=.16,dang="triangle"){
  const c=batLoa(); if(!c) return;
  const bd=c.currentTime+t,o=c.createOscillator(),g=c.createGain();
  o.type=dang; o.frequency.setValueAtTime(f,bd);
  g.gain.setValueAtTime(.0001,bd); g.gain.exponentialRampToValueAtTime(v,bd+.02);
  g.gain.exponentialRampToValueAtTime(.0001,bd+d);
  o.connect(g).connect(c.destination); o.start(bd); o.stop(bd+d+.05);
}
const amNhac=()=>keoChuong(660,.1,0,.09);
const amDung=()=>{ keoChuong(784,.15,0,.16); keoChuong(1046.5,.3,.1,.16); };
const amSai =()=>keoChuong(196,.26,0,.11,"sine");
const nhacThang=()=>[523.25,659.25,783.99,1046.5,783.99,1046.5,1318.51].forEach((n,i)=>keoChuong(n,.45,i*.16,.18));

/* ===== 4 MÀU GIỎ ===== */
const MAU = [
  { id:"hong", ten:"Hồng",  chinh:"#FFB7C5", dam:"#E9799C" },
  { id:"vang", ten:"Vàng",  chinh:"#FFE0A3", dam:"#E0A94F" },
  { id:"mint", ten:"Xanh",  chinh:"#A8E6CF", dam:"#7FCFB0" },
  { id:"tim",  ten:"Tím",   chinh:"#C9B6F5", dam:"#9B85D6" }
];

/* ===== KHO ĐỒ VẬT: hình dáng vẽ bằng SVG, màu do giỏ quyết định ===== */
const KIEU_DO = [
  c=>`<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="34" fill="${c.chinh}" stroke="${c.dam}" stroke-width="4"/>
      <path d="M50 21 v-10" stroke="#7FCFB0" stroke-width="5" stroke-linecap="round"/>
      <path d="M50 16 q14-8 20 2 q-14 6-20-2z" fill="#A8E6CF"/></svg>`,                       /* quả táo */
  c=>`<svg viewBox="0 0 100 100"><path d="M50 10 L61 40 L93 43 L68 63 L77 94 L50 76 L23 94 L32 63 L7 43 L39 40 Z"
      fill="${c.chinh}" stroke="${c.dam}" stroke-width="4" stroke-linejoin="round"/></svg>`,   /* ngôi sao */
  c=>`<svg viewBox="0 0 100 100"><path d="M50 90 C12 66 14 30 33 24 C43 21 50 30 50 38 C50 30 57 21 67 24 C86 30 88 66 50 90 Z"
      fill="${c.chinh}" stroke="${c.dam}" stroke-width="4"/></svg>`,                            /* trái tim */
  c=>`<svg viewBox="0 0 100 100"><g fill="${c.chinh}" stroke="${c.dam}" stroke-width="3">
      <circle cx="50" cy="30" r="15"/><circle cx="30" cy="50" r="15"/><circle cx="70" cy="50" r="15"/><circle cx="50" cy="70" r="15"/></g>
      <circle cx="50" cy="50" r="11" fill="#FFF3C4" stroke="#E0A94F" stroke-width="3"/></svg>`, /* bông hoa */
  c=>`<svg viewBox="0 0 100 100"><rect x="18" y="34" width="64" height="46" rx="10" fill="${c.chinh}" stroke="${c.dam}" stroke-width="4"/>
      <path d="M18 46 h64" stroke="${c.dam}" stroke-width="3"/>
      <path d="M50 34 v-8" stroke="${c.dam}" stroke-width="4" stroke-linecap="round"/>
      <circle cx="50" cy="22" r="7" fill="#FFF" stroke="${c.dam}" stroke-width="3"/></svg>`,    /* hộp quà */
  c=>`<svg viewBox="0 0 100 100"><circle cx="50" cy="38" r="24" fill="${c.chinh}" stroke="${c.dam}" stroke-width="4"/>
      <rect x="45" y="60" width="10" height="30" rx="4" fill="#E6D3B8" stroke="#C4A882" stroke-width="3"/>
      <circle cx="42" cy="32" r="5" fill="#fff" opacity=".7"/></svg>`,                          /* kẹo mút */
  c=>`<svg viewBox="0 0 100 100"><path d="M20 78 L50 16 L80 78 Z" fill="${c.chinh}" stroke="${c.dam}" stroke-width="4" stroke-linejoin="round"/></svg>`, /* tam giác */
  c=>`<svg viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" rx="12" fill="${c.chinh}" stroke="${c.dam}" stroke-width="4"/>
      <circle cx="50" cy="50" r="12" fill="#fff" opacity=".55"/></svg>`                          /* khối vuông */
];

/* ===== HÌNH CÁI GIỎ ===== */
const veGio = m => `<svg viewBox="0 0 100 80">
  <path d="M6 24 h88 l-11 44 a8 8 0 0 1 -8 6 h-50 a8 8 0 0 1 -8 -6z" fill="${m.chinh}" stroke="${m.dam}" stroke-width="4" stroke-linejoin="round"/>
  <path d="M26 32 v40 M50 32 v42 M74 32 v40" stroke="${m.dam}" stroke-width="3" stroke-linecap="round" opacity=".7"/>
  <path d="M24 24 q26-22 52 0" fill="none" stroke="${m.dam}" stroke-width="5" stroke-linecap="round"/></svg>`;

/* ===== TRẠNG THÁI ===== */
const sanDo=document.getElementById("sanDo"), hangGio=document.getElementById("hangGio");
const oGom=document.getElementById("soGom"), oDongHo=document.getElementById("dongHo"), oKyLuc=document.getElementById("kyLuc");
const manThang=document.getElementById("manThang");
const TONG_DO = 12;                                  /* 12 đồ vật, mỗi màu 3 cái */
let daGom=0, soSai=0, giay=0, dongHoChay=null, daBatDau=false;
const demTheoGio = {};

let kyLucTam=null;
const docKyLuc=()=>{ try{ const v=localStorage.getItem("kyluc_game4"); return v?parseInt(v,10):null; }catch(e){ return kyLucTam; } };
const ghiKyLuc=s=>{ try{ localStorage.setItem("kyluc_game4",s); }catch(e){ kyLucTam=s; } };
const dinhDangGio=s=>Math.floor(s/60)+":"+String(s%60).padStart(2,"0");

/* ===== VÁN MỚI ===== */
function vanMoi(){
  sanDo.innerHTML=""; hangGio.innerHTML="";
  daGom=0; soSai=0; giay=0; daBatDau=false;
  clearInterval(dongHoChay);
  oGom.textContent="0/"+TONG_DO; oDongHo.textContent="0:00";
  const kl=docKyLuc(); oKyLuc.textContent=kl?dinhDangGio(kl):"--";
  manThang.classList.remove("hien");
  document.getElementById("bangKyLuc").classList.remove("hien");
  dungPhaoGiay();

  /* Dựng 4 cái giỏ */
  MAU.forEach(m=>{
    demTheoGio[m.id]=0;
    const g=document.createElement("div");
    g.className="gio"; g.dataset.mau=m.id;
    g.style.setProperty("--mau", m.chinh);
    g.innerHTML = veGio(m) + `<span class="ten-gio">Giỏ ${m.ten}</span><span class="dem" id="dem-${m.id}">0</span>`;
    hangGio.appendChild(g);
  });

  /* Tạo 12 đồ vật: mỗi màu 3 cái, kiểu dáng ngẫu nhiên */
  const dsDo=[];
  MAU.forEach(m=>{
    for(let i=0;i<3;i++){
      const kieu = KIEU_DO[Math.floor(Math.random()*KIEU_DO.length)];
      dsDo.push({ mau:m, hinh:kieu(m) });
    }
  });
  dsDo.sort(()=>Math.random()-.5);

  dsDo.forEach(d=>{
    const e=document.createElement("div");
    e.className="do-vat"; e.dataset.mau=d.mau.id;
    e.setAttribute("aria-label","Đồ vật màu "+d.mau.ten);
    e.innerHTML=d.hinh;
    ganKeoTha(e);
    sanDo.appendChild(e);
  });
}

/* ===== KÉO THẢ BẰNG POINTER EVENTS (chuột + ngón tay) ===== */
function ganKeoTha(do_){
  let keo=false, lechX=0, lechY=0, gioCu=null;
  do_.addEventListener("pointerdown", bd);

  function bd(e){
    batLoa();
    if(do_.classList.contains("xong")) return;
    batDauGio(); amNhac();
    keo=true;
    const o=do_.getBoundingClientRect();
    lechX=e.clientX-o.left; lechY=e.clientY-o.top;
    do_.classList.add("dang-keo");
    do_.style.width=o.width+"px"; do_.style.height=o.height+"px";
    dat(e.clientX,e.clientY);
    do_.setPointerCapture(e.pointerId);
    do_.addEventListener("pointermove", di);
    do_.addEventListener("pointerup", tha);
    do_.addEventListener("pointercancel", tha);
    e.preventDefault();
  }
  function dat(x,y){ do_.style.left=(x-lechX)+"px"; do_.style.top=(y-lechY)+"px"; }
  function di(e){
    if(!keo) return;
    dat(e.clientX,e.clientY);
    const g=timGio(e.clientX,e.clientY);
    if(g!==gioCu){ if(gioCu) gioCu.classList.remove("gan-toi"); if(g) g.classList.add("gan-toi"); gioCu=g; }
  }
  function tha(e){
    if(!keo) return;
    keo=false;
    do_.removeEventListener("pointermove", di);
    do_.removeEventListener("pointerup", tha);
    do_.removeEventListener("pointercancel", tha);
    do_.classList.remove("dang-keo"); do_.style.cssText="";
    if(gioCu) gioCu.classList.remove("gan-toi");
    const g=timGio(e.clientX,e.clientY);
    gioCu=null;
    if(!g) return;

    if(g.dataset.mau===do_.dataset.mau){
      do_.classList.add("xong");
      g.classList.add("dung");
      setTimeout(()=>g.classList.remove("dung"),460);
      amDung();
      daGom++;
      demTheoGio[g.dataset.mau]++;
      document.getElementById("dem-"+g.dataset.mau).textContent = demTheoGio[g.dataset.mau];
      oGom.textContent = daGom+"/"+TONG_DO;
      if(sanDo.querySelectorAll(".do-vat:not(.xong)").length===0){
        sanDo.innerHTML='<span class="loi-het">Sân đã sạch bong rồi!</span>';
      }
      if(daGom===TONG_DO) setTimeout(thangCuoc,600);
    }else{
      g.classList.add("sai");
      amSai(); soSai++;
      setTimeout(()=>g.classList.remove("sai"),420);
    }
  }
}
function timGio(x,y){
  return [...hangGio.children].find(g=>{
    const r=g.getBoundingClientRect();
    return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom;
  }) || null;
}
function batDauGio(){
  if(daBatDau) return;
  daBatDau=true;
  dongHoChay=setInterval(()=>{ giay++; oDongHo.textContent=dinhDangGio(giay); },1000);
}

/* ===== THẮNG CUỘC ===== */
function thangCuoc(){
  clearInterval(dongHoChay);
  nhacThang(); banPhaoGiay();
  document.getElementById("tgCuoi").textContent=dinhDangGio(giay);
  document.getElementById("saiCuoi").textContent=soSai;
  const cu=docKyLuc();
  if(cu===null||giay<cu){
    ghiKyLuc(giay);
    document.getElementById("bangKyLuc").classList.add("hien");
    document.getElementById("loiKhen").textContent="Bé gom nhanh hơn lần trước rồi!";
  }else{
    document.getElementById("loiKhen").textContent="Lần sau bé thử phá kỷ lục nhé!";
  }
  oKyLuc.textContent=dinhDangGio(docKyLuc());
  manThang.classList.add("hien");
}

/* ===== PHÁO GIẤY ===== */
const canvas=document.getElementById("phaoGiay"), ctx2d=canvas.getContext("2d");
let hatGiay=[], vongLap=null;
const MAU_GIAY=["#FFB7C5","#C9B6F5","#FFE0A3","#A8E6CF","#BFE3FF","#FFCBA4"];
function banPhaoGiay(){
  canvas.style.display="block"; canvas.width=innerWidth; canvas.height=innerHeight;
  hatGiay=[];
  for(let i=0;i<160;i++) hatGiay.push({ x:Math.random()*canvas.width, y:Math.random()*-canvas.height,
    r:5+Math.random()*7, mau:MAU_GIAY[i%MAU_GIAY.length], rung:Math.random()*6.28, toc:1.6+Math.random()*2.6, xoay:(Math.random()-.5)*.2 });
  cancelAnimationFrame(vongLap); veGiay();
}
function veGiay(){
  ctx2d.clearRect(0,0,canvas.width,canvas.height);
  hatGiay.forEach(h=>{
    h.y+=h.toc; h.rung+=h.xoay; h.x+=Math.sin(h.rung)*1.4;
    if(h.y>canvas.height+20){ h.y=-20; h.x=Math.random()*canvas.width; }
    ctx2d.save(); ctx2d.translate(h.x,h.y); ctx2d.rotate(h.rung);
    ctx2d.fillStyle=h.mau; ctx2d.fillRect(-h.r/2,-h.r/2,h.r,h.r*1.5); ctx2d.restore();
  });
  vongLap=requestAnimationFrame(veGiay);
}
function dungPhaoGiay(){ cancelAnimationFrame(vongLap); canvas.style.display="none"; ctx2d.clearRect(0,0,canvas.width,canvas.height); }
